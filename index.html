<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINESWEEPER PROFESSIONAL</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="./styles/style.css">
    <link rel="stylesheet" href="./styles/style_index.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <img src="./images/favicon.png" alt="Logo" class="mini-logo">
            <h1>WELCOME</h1>
        </div>
    </header>

    <main>
        <div id="setup-container">
        <h2 class="game-title">MINESWEEPER</h2>

        <form id="setup-form" action="./pages/game.html" method="GET">
            <div class="input-group">
                <label for="player-name">Name</label>
                <div class="input-row">
                    <input type="text" id="player-name" name="userName" placeholder="Enter name" required>
                </div>
            </div>

            <div class="input-group">
                <label for="level-select">Choose a level</label>
                <select id="level-select" name="level" required>
                    <option value="" disabled selected>Select level...</option>
                    <option value="easy">9x9 easy</option>
                    <option value="normal">16x16 normal</option>
                    <option value="hard">30x16 hard</option>
                </select>
            </div>

            <div class="actions">
                <button type="submit" id="start-btn" class="primary-btn">Start gaming</button>
                <a href="./pages/highScores.html" id="view-highscores-btn" class="primary-btn">highscores</a>
            </div>
        </form>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>RIVI ©</p>
        </div>
    </footer>

    </body>
</html>
